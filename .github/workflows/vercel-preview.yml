name: Vercel Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify Vercel secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for secret_name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error title=Missing GitHub Actions secret::${secret_name} is not configured. Add it in GitHub Settings -> Secrets and variables -> Actions, then re-run this workflow."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Pull Vercel environment
        run: npx vercel@53.2.0 pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Build on Vercel
        run: npx vercel@53.2.0 build --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt output to Vercel
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOYMENT_URL="$(npx vercel@53.2.0 deploy --prebuilt --token "$VERCEL_TOKEN" | tail -n 1)"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOYMENT_URL"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.deployment_url }}`;
            const body = `✅ Vercel preview is ready: ${url}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
