  <circle cx="7.5" cy="24.5" r="2" fill="#4F46E5" opacity="0.7"/>
  <circle cx="16" cy="16.75" r="2.5" fill="#6366F1" opacity="0.88"/>
  <circle cx="24.5" cy="9" r="5.5" fill="rgba(129,140,248,0.18)" filter="url(#glow)"/>
  <circle cx="24.5" cy="9" r="3" fill="url(#peak)" filter="url(#glow)"/>
  <line x1="25.5" y1="3.5" x2="25.5" y2="6" stroke="rgba(224,231,255,0.85)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24.25" y1="4.75" x2="26.75" y2="4.75" stroke="rgba(224,231,255,0.85)" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="25.5" cy="4.75" r="0.8" fill="white"/>
